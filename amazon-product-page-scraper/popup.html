<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, Segoe UI, sans-serif; width: 280px; padding: 14px; margin: 0; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    button { width: 100%; padding: 10px; background: #ff9900; color: #111; border: 0; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; }
    button:disabled { opacity: 0.6; cursor: progress; }
    #status { margin-top: 10px; font-size: 12px; white-space: pre-wrap; color: #333; min-height: 18px; }
    .ok { color: #0a7d28; }
    .err { color: #b00020; }
  </style>
</head>
<body>
  <h1>Amazon Affiliate Scraper</h1>
  <button id="scrape">Scrape this page</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
