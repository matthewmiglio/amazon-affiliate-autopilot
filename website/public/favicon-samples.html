<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Favicon samples — Soft Luxe Daily</title>
<style>
  :root {
    --bg: #fbf7f3;
    --ink: #2a2522;
    --muted: #6b5e57;
    --rose: #d6a8a0;
    --rose-soft: #f5e2dc;
    --gold: #b58a3a;
    --gold-soft: #e7d3a4;
    --line: #e8ddd4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, sans-serif;
    padding: 48px 24px 96px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  h1 {
    font-family: ui-serif, Georgia, serif;
    font-size: 40px;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  p.lede { color: var(--muted); margin: 0 0 40px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 24px;
  }
  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 24px 16px 18px;
    text-align: center;
    transition: box-shadow .2s, transform .2s;
  }
  .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.06); transform: translateY(-2px); }
  .icon {
    width: 110px; height: 110px; margin: 0 auto 14px;
    border-radius: 50%;
    display: block;
    overflow: hidden;
  }
  .num {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .label {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.4;
  }
  .small-row {
    margin-top: 10px;
    display: flex;
    justify-content: center;
    gap: 10px;
    align-items: center;
  }
  .small-row .icon-mini {
    width: 32px; height: 32px; border-radius: 50%; overflow: hidden;
  }
  .small-row .icon-tiny {
    width: 16px; height: 16px; border-radius: 50%; overflow: hidden;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Favicon candidates</h1>
  <p class="lede">10 circular icon directions for Soft Luxe Daily. Tell me a number.</p>

  <div class="grid" id="grid"></div>
</div>

<script>
const ICONS = [
  {
    label: "Serif S — ink on cream",
    svg: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="50" fill="#fbf7f3"/>
      <text x="50" y="68" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="62" fill="#2a2522">S</text>
    </svg>`
  },
  {
    label: "Serif S — gold on ink",
    svg: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="50" fill="#2a2522"/>
      <text x="50" y="68" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="62" fill="#b58a3a">S</text>
    </svg>`
  },
  {
    label: "SLD monogram — ink on rose",
    svg: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="50" fill="#f5e2dc"/>
      <text x="50" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="28" letter-spacing="2" fill="#2a2522">SLD</text>
    </svg>`
  },
  {
    label: "Gold ring + serif S",
    svg: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="50" fill="#fbf7f3"/>
      <circle cx="50" cy="50" r="42" fill="none" stroke="#b58a3a" stroke-width="2"/>
      <text x="50" y="66" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="50" fill="#2a2522">S</text>
    </svg>`
  },
  {
    label: "Botanical sprig",
    svg: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="50" fill="#fbf7f3"/>
      <path d="M50 22 V78" stroke="#2a2522" stroke-width="2" stroke-linecap="round"/>
      <path d="M50 32 Q38 30 32 38 Q40 40 50 38" fill="#b58a3a"/>
      <path d="M50 32 Q62 30 68 38 Q60 40 50 38" fill="#b58a3a"/>
      <path d="M50 46 Q40 44 34 52 Q42 54 50 52" fill="#b58a3a"/>
      <path d="M50 46 Q60 44 66 52 Q58 54 50 52" fill="#b58a3a"/>
      <path d="M50 60 Q42 58 36 66 Q44 68 50 66" fill="#b58a3a"/>
      <path d="M50 60 Q58 58 64 66 Q56 68 50 66" fill="#b58a3a"/>
    </svg>`
  },
  {
    label: "Rose & ink crescent",
    svg: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="50" fill="#d6a8a0"/>
      <path d="M70 20 A40 40 0 1 0 70 80 A30 30 0 1 1 70 20 Z" fill="#fbf7f3"/>
    </svg>`
  },
  {
    label: "Diamond / rhombus mark",
    svg: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="50" fill="#fbf7f3"/>
      <path d="M50 22 L72 50 L50 78 L28 50 Z" fill="none" stroke="#2a2522" stroke-width="2.2" stroke-linejoin="round"/>
      <circle cx="50" cy="50" r="6" fill="#b58a3a"/>
    </svg>`
  },
  {
    label: "Sun rays — gold on cream",
    svg: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="50" fill="#fbf7f3"/>
      <g stroke="#b58a3a" stroke-width="2" stroke-linecap="round">
        <line x1="50" y1="20" x2="50" y2="30"/>
        <line x1="50" y1="70" x2="50" y2="80"/>
        <line x1="20" y1="50" x2="30" y2="50"/>
        <line x1="70" y1="50" x2="80" y2="50"/>
        <line x1="29" y1="29" x2="36" y2="36"/>
        <line x1="64" y1="64" x2="71" y2="71"/>
        <line x1="71" y1="29" x2="64" y2="36"/>
        <line x1="36" y1="64" x2="29" y2="71"/>
      </g>
      <circle cx="50" cy="50" r="14" fill="#b58a3a"/>
    </svg>`
  },
  {
    label: "Pearl drop",
    svg: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="pearl" cx="42%" cy="38%" r="60%">
          <stop offset="0%" stop-color="#fff8f3"/>
          <stop offset="55%" stop-color="#f5e2dc"/>
          <stop offset="100%" stop-color="#d6a8a0"/>
        </radialGradient>
      </defs>
      <circle cx="50" cy="50" r="50" fill="#2a2522"/>
      <circle cx="50" cy="50" r="28" fill="url(#pearl)"/>
    </svg>`
  },
  {
    label: "Wordmark — sld lowercase",
    svg: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="50" fill="#fbf7f3"/>
      <text x="50" y="58" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="30" fill="#2a2522">sld</text>
      <line x1="32" y1="68" x2="68" y2="68" stroke="#b58a3a" stroke-width="1.5"/>
    </svg>`
  },
];

const grid = document.getElementById("grid");
ICONS.forEach((icon, i) => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="num">No. ${String(i + 1).padStart(2, "0")}</div>
    <div class="icon">${icon.svg}</div>
    <div class="label">${icon.label}</div>
    <div class="small-row">
      <span class="icon-mini">${icon.svg}</span>
      <span class="icon-tiny">${icon.svg}</span>
    </div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
