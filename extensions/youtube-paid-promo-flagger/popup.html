<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: -apple-system, Segoe UI, sans-serif; width: 380px; padding: 14px; margin: 0; background: #1a1a1a; color: #eee; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  .row { display: flex; gap: 8px; margin-bottom: 10px; }
  button { flex: 1; padding: 10px; border: 0; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 13px; }
  #start { background: #ff0000; color: #fff; }
  #stop { background: #444; color: #fff; }
  #copy { background: #ff9900; color: #111; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
  .kpi { background: #2a2a2a; border-radius: 6px; padding: 8px; text-align: center; }
  .kpi .v { font-size: 18px; font-weight: 700; color: #fff; }
  .kpi .l { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi.flagged .v { color: #3ec55c; }
  .kpi.skipped .v { color: #ffd400; }
  .kpi.failed .v { color: #ff5252; }
  #log { background: #0a0a0a; border-radius: 6px; padding: 8px; font-family: Consolas, monospace; font-size: 11px; height: 220px; overflow-y: auto; white-space: pre-wrap; line-height: 1.4; color: #c8c8c8; }
  #log .err { color: #ff7878; }
  #log .ok { color: #6bd97a; }
  #log .info { color: #8fb6ff; }
  #phase { font-size: 11px; color: #aaa; margin-top: 6px; text-align: right; font-family: Consolas, monospace; }
</style>
</head>
<body>
  <h1>YT Paid Promotion Flagger</h1>
  <div class="row">
    <button id="start">Start</button>
    <button id="stop">Stop</button>
    <button id="copy">Copy log</button>
  </div>
  <div class="kpis">
    <div class="kpi"><div class="v" id="kTotal">0</div><div class="l">total</div></div>
    <div class="kpi flagged"><div class="v" id="kFlagged">0</div><div class="l">flipped</div></div>
    <div class="kpi skipped"><div class="v" id="kSkipped">0</div><div class="l">skipped</div></div>
    <div class="kpi failed"><div class="v" id="kFailed">0</div><div class="l">failed</div></div>
  </div>
  <div id="log"></div>
  <div id="phase">idle</div>
  <script src="popup.js"></script>
</body>
</html>
